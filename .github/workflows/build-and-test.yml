# This workflow builds, tests and analyzes the .NET + React solution.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
#
# The work is split across parallel jobs that run on independent runners:
#   build    — compiles the server and publishes the OpenAPI document as an artifact (fast gate for frontend)
#   test     — restores, builds and runs the TUnit suite with coverage (independent long pole)
#   frontend — Node-only pipeline; downloads the OpenAPI artifact for codegen
# Keeping test independent (it rebuilds) trades a little compute for wall-clock: it runs from t=0
# in parallel with everything else instead of waiting behind the build.
#
# CodeQL is intentionally NOT run per-PR — the scheduled codeql.yml covers the repo weekly.
# This keeps every push fast at the cost of delayed security feedback on PR code.

name: Build and test
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel superseded runs on a PR branch; never cancel pushes to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props', '**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Restore tools
      run: dotnet tool restore

    - name: Restore packages
      run: dotnet restore

    - name: Format
      run: dotnet csharpier check .

    # Server-only since ADR-0023: emits artifacts/openapi/Balance.Web.json that codegen consumes.
    - name: Build
      run: dotnet build --no-restore

    - name: Upload OpenAPI document
      uses: actions/upload-artifact@v7
      with:
        name: openapi
        path: artifacts/openapi/Balance.Web.json
        if-no-files-found: error
        retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props', '**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Restore packages
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: >
        dotnet test
        --no-build
        --report-github
        --report-github-summary-include-passed=true
        --report-github-summary-include-skipped=true
        --coverage
        --coverage-output $GITHUB_WORKSPACE/tests/coverage/coverage.cobertura.xml
        --coverage-output-format cobertura
        && mkdir -p ./tests/report
        && cp $GITHUB_STEP_SUMMARY ./tests/report/results.md

    - name: Add test results as pull request comment
      uses: marocchino/sticky-pull-request-comment@v3
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        header: tests
        path: ./tests/report/results.md

    - name: Publish code coverage results
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
      with:
        reports: ./tests/coverage/coverage.cobertura.xml
        targetdir: ./tests/report
        reporttypes: MarkdownSummaryGithub

    - name: Write code coverage results to summary
      run: cat ./tests/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Add coverage report as pull request comment
      uses: marocchino/sticky-pull-request-comment@v3
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        header: coverage
        path: ./tests/report/SummaryGithub.md

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    # Only the OpenAPI document is needed from the server build; codegen and the
    # generated-file drift gate (ADR-0023) consume it. No .NET SDK required here.
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm

    - name: Download OpenAPI document
      uses: actions/download-artifact@v4
      with:
        name: openapi
        path: artifacts/openapi

    - name: Restore npm packages
      run: npm ci

    - name: Generate API types
      run: npm run codegen

    # Re-extract Lingui catalogs and fail if they drift from what the source
    # produces — an un-wrapped or un-extracted string can't slip through (ADR-0022).
    - name: Check i18n catalogs are up to date
      run: |
        npm run extract
        git diff --exit-code -- 'src/Balance.Web.Client/src/locales/**/*.po'

    - name: Frontend lint
      run: npm run lint

    - name: Frontend format check
      run: npm run format:check

    - name: Frontend test
      run: npm run test

    # vite build + tsc -b; outputs to src/Balance.Web/wwwroot and regenerates routeTree.gen.ts
    - name: Frontend build
      run: npm run build

    # Committed generated TypeScript must match what this build just produced (ADR-0023).
    - name: Check generated files are up to date
      run: git diff --exit-code -- '*.gen.ts'
